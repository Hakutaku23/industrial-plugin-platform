# Industrial Plugin Platform deploy-time configuration
#
# Local offline verification profile:
# - Redis runs in Docker and is accessed from the host machine through 127.0.0.1:6379
# - MySQL runs in Docker and is accessed from the host machine through 127.0.0.1:3306
# - Metadata storage is switched from SQLite to MySQL
#
# Important:
# 1. The password in the MySQL URL uses URL encoding for "!" -> %21
# 2. The actual MySQL password remains exactly: PSELAB!2025.

app:
  name: industrial-plugin-platform
  environment: dev

storage:
  package_storage_dir: var/packages
  run_storage_dir: var/runs

metadata:
  backend: mysql
  sqlite_path: var/platform.sqlite3
  db_url: "mysql+pymysql://platform:PSELAB%212025.@127.0.0.1:3306/industrial_plugin_platform?charset=utf8mb4"

scheduler:
  enabled: true
  poll_interval_sec: 1.0
  max_workers: 4
  lock_ttl_sec: 300
  redis_url: "redis://127.0.0.1:6379/0"
  lock_key_prefix: "lock:instance"

runner:
  default_timeout_sec: 30
  max_timeout_sec: 300
  work_root: var/runs

logging:
  level: INFO

connectors:
  redis:
    default_host: 127.0.0.1
    default_port: 6379
    default_db: 0
    default_connect_timeout_sec: 2.0
    default_socket_timeout_sec: 2.0
  retry:
    max_attempts: 3
    base_delay_sec: 1.0
    max_delay_sec: 8.0

security:
  enabled: true
  session_cookie_name: ipp_session
  session_cookie_secure: false
  session_cookie_samesite: lax
  session_ttl_sec: 43200
  bootstrap_admin_username: admin
  bootstrap_admin_password: "admin123456"
  bootstrap_admin_display_name: Local Administrator
  bootstrap_admin_email: null
