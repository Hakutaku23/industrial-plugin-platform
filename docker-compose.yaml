version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: ipp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: ipp-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "PSELAB!2025."
      MYSQL_DATABASE: "industrial_plugin_platform"
      MYSQL_USER: "platform"
      MYSQL_PASSWORD: "PSELAB!2025."
      TZ: "Asia/Shanghai"
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_0900_ai_ci",
        "--default-time-zone=+08:00"
      ]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uplatform -p'PSELAB!2025.' --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  tdengine:
    image: tdengine/tdengine:latest
    container_name: ipp-tdengine
    hostname: ipp-tdengine
    restart: unless-stopped
    ports:
      - "6030:6030"
      - "6041:6041"
      - "6043-6049:6043-6049"
      - "6043-6049:6043-6049/udp"
    environment:
      TZ: "Asia/Shanghai"
    volumes:
      - tdengine_data:/var/lib/taos
      - tdengine_log:/var/log/taos
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "taos -s 'show databases;' >/dev/null 2>&1 || wget -qO- --user=root --password=taosdata --post-data='show databases;' http://127.0.0.1:6041/rest/sql >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  dev:
    image: ipp-platform-dev:v0.1
    container_name: ipp-platform-dev
    restart: unless-stopped
    working_dir: /workspace
    command: ["bash", "-lc", "while true; do sleep 3600; done"]
    stdin_open: true
    tty: true
    ports:
      - "8022:22"
      - "8000:8000"
    volumes:
      - ./:/workspace
    environment:
      TZ: "Asia/Shanghai"
      TDENGINE_URL: "http://tdengine:6041"
      TDENGINE_USER: "root"
      TDENGINE_PASSWORD: "taosdata"
      TDENGINE_DATABASE: "ipp_test"
      TDENGINE_TABLE_NAME: "point_history"
    depends_on:
      - redis
      - mysql
      - tdengine

volumes:
  redis_data:
  mysql_data:
  tdengine_data:
  tdengine_log:
